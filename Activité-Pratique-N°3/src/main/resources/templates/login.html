<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css}">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header bg-dark text-white text-center">
                    <i class="bi bi-shield-lock"></i> Authentification
                </div>
                <div class="card-body">

                    <div class="alert alert-danger" th:if="${param.error}">
                        <i class="bi bi-exclamation-triangle"></i> Nom d'utilisateur ou mot de passe incorrect.
                    </div>
                    <div class="alert alert-success" th:if="${param.logout}">
                        <i class="bi bi-check-circle"></i> Vous êtes déconnecté.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Nom d'utilisateur</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">
                            <i class="bi bi-box-arrow-in-right"></i> Se connecter
                        </button>
                    </form>

                    <hr>
                    <small class="text-muted">
                        Comptes de démo : <br>
                        <b>user / 1234</b> (consultation) <br>
                        <b>admin / 1234</b> (administration)
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
