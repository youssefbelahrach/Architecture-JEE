<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Liste des produits</h2>
    <button class="btn btn-outline-secondary btn-sm" (click)="loadProducts()">Rafraîchir</button>
  </div>

  <table class="table table-striped table-bordered align-middle">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Prix (DH)</th>
        <th>Selected</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products" [class.table-active]="product.selected">
        <td>{{ product.id }}</td>
        <td>{{ product.name }}</td>
        <td>{{ product.price | number:'1.2-2' }}</td>
        <td>
          <input type="radio" class="form-check-input" [checked]="product.selected" (click)="$event.preventDefault(); toggleSelected(product)">
        </td>
        <td>
          <button class="btn btn-danger btn-sm" (click)="onDelete(product.id)">
            <i class="bi bi-trash"></i> Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="products.length === 0" class="text-muted">Aucun produit disponible.</p>
</div>
