spring.application.name=digital-banking-backend
server.port=8085

# ============================================================
#  BASE DE DONNEES H2 (en memoire) - pour demarrer rapidement
# ============================================================
spring.datasource.url=jdbc:h2:mem:banking-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
# Console H2 accessible sur : http://localhost:8085/h2-console
# (JDBC URL a saisir dans la console : jdbc:h2:mem:banking-db)

# ============================================================
#  BASE DE DONNEES MySQL - a activer plus tard (decommenter)
# ============================================================
# spring.datasource.url=jdbc:mysql://localhost:3306/banking-db?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=

# ============================================================
#  JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
#  Securite / JWT
# ============================================================
# Cle secrete symetrique (HS512). En production, ne jamais la
# laisser en clair : utiliser une variable d'environnement.
# Elle doit etre suffisamment longue (>= 64 caracteres pour HS512).
jwt.secret=9faf8a3c2b1e4d6f8a0c2e4b6d8f0a1c3e5b7d9f1a3c5e7b9d0f2a4c6e8b0d2f4
