<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <i class="bi bi-pencil me-1"></i> Edit Product
      </div>
      <div class="card-body">
        @if (errorMessage) { <div class="alert alert-danger">{{ errorMessage }}</div> }

        <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">ID</label>
            <input type="text" class="form-control" formControlName="id">
          </div>

          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" formControlName="name"
                   [class.is-invalid]="submitted && f.name.invalid">
            @if (submitted && f.name.errors) {
              <div class="invalid-feedback">Name is required (3 to 60 characters).</div>
            }
          </div>

          <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" step="0.01" class="form-control" formControlName="price"
                   [class.is-invalid]="submitted && f.price.invalid">
          </div>

          <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" class="form-control" formControlName="quantity"
                   [class.is-invalid]="submitted && f.quantity.invalid">
          </div>

          <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" id="selectedEdit" formControlName="selected">
            <label class="form-check-label" for="selectedEdit">Selected</label>
          </div>

          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-1"></i> Update
          </button>
          <a routerLink="/products" class="btn btn-secondary ms-2">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
