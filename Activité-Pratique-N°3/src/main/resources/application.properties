spring.application.name=product-app
server.port=8080

# ============================================================
#   BASE DE DONNEES H2 (en mémoire) - active par défaut
# ============================================================
spring.datasource.url=jdbc:h2:mem:products-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 accessible sur http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
#   BASE DE DONNEES MySQL - decommenter pour l'utiliser
#   (creer la base : CREATE DATABASE products_db;)
# ============================================================
#spring.datasource.url=jdbc:mysql://localhost:3306/products_db?createDatabaseIfNotExist=true
#spring.datasource.username=root
#spring.datasource.password=
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
#   JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
