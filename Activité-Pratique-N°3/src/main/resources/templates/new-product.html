<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{template1}">
<head>
    <title>Nouveau produit</title>
</head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <i class="bi bi-plus-circle"></i> Ajouter un produit
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/saveProduct}" th:object="${product}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Nom</label>
                            <input type="text" th:field="*{name}" class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Prix (DH)</label>
                            <input type="number" step="0.01" th:field="*{price}" class="form-control"
                                   th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}"
                                 th:errors="*{price}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quantité</label>
                            <input type="number" th:field="*{quantity}" class="form-control"
                                   th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}"
                                 th:errors="*{quantity}"></div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/user/index}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Annuler
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-save"></i> Enregistrer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
