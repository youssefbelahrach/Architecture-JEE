spring.application.name=products-app

# ============================================================
#  ETAPE 6 : Migration de H2 vers MySQL
# ============================================================
#  Pour utiliser ce fichier au lieu de H2, deux options :
#   a) Copier ce contenu dans application.properties, OU
#   b) Lancer avec le profil mysql :
#      mvn spring-boot:run -Dspring-boot.run.profiles=mysql
# ============================================================

server.port=8085

# Connexion MySQL
# createDatabaseIfNotExist=true cree la base automatiquement si absente
spring.datasource.url=jdbc:mysql://localhost:3306/products_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Le driver est detecte automatiquement, mais on peut l'expliciter :
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate cree/met a jour les tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Dialecte MySQL (optionnel avec les versions recentes d'Hibernate)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
